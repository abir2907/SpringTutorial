spring.application.name=module4

#DB configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.url=jdbc:mysql://localhost:3306/prod-ready-features?useSSL=false
spring.datasource.username=root
spring.datasource.password=abir2711

server.port = 9000

employeeService.base.url=http://localhost:8080/

# Logging configuration
# By default logging is enabled only till INFO level
logging.level.com.spring.abir.module4.clients=TRACE
logging.pattern.console=%d{dd-mm-yyyy hh:MM:ss} [%level] %c{2.} --- %m%n
logging.file.name=application.log
logging.config=classpath:logback-spring.xml

## Actuator configuration
management.endpoints.web.exposure.include=*
management.info.env.enabled=true
info.app.author=Abir Chodha
info.app.version=1.0.0
info.app.documentation=https://codingshuttle.com/docs
management.endpoint.env.show-values=always
management.info.build.enabled=true
management.info.git.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true